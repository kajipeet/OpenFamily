# TURN server configuration for OpenFamily
# Edit listening-ip and realm for your server
listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
# Set your server's public IP:
# listening-ip=YOUR_PUBLIC_IP
realm=openfamily.local
# Generate: openssl rand -hex 32
static-auth-secret=changeme_turn_secret
no-multicast-peers
log-file=/var/log/coturn/turnserver.log
simple-log
