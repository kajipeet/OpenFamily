services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_strong_password}
      MONGO_INITDB_DATABASE: openfamily
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme_strong_password}@mongodb:27017/openfamily?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_64chars_minimum_please}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change_this_32byte_key_please!!}
      UPLOAD_DIR: /app/uploads
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_admin_please}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      UPLOAD_CHUNK_SIZE: ${UPLOAD_CHUNK_SIZE:-8388608}
      GIN_MODE: release
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_URL: /api
      NUXT_PUBLIC_WS_URL: /ws
      NUXT_PUBLIC_TURN_SERVER: ${NUXT_PUBLIC_TURN_SERVER:-}
      NUXT_PUBLIC_TURN_SECRET: ${TURN_SECRET:-changeme_turn_secret}
    networks:
      - internal

  nginx:
    build: ./nginx
    restart: unless-stopped
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: -c /etc/coturn/turnserver.conf

volumes:
  mongo_data:
  uploads_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
