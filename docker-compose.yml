services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_strong_password}
      MONGO_INITDB_DATABASE: openfamily
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme_strong_password}@mongodb:27017/openfamily?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_64chars_minimum_please}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change_this_32byte_key_please!!}
      UPLOAD_DIR: /app/uploads
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_admin_please}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      UPLOAD_CHUNK_SIZE: ${UPLOAD_CHUNK_SIZE:-8388608}
      GIN_MODE: release
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: -c /etc/coturn/turnserver.conf

  certbot:
    image: certbot/certbot:latest
    profiles: ["manual"]
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - ./nginx/ssl:/exported-certs
    networks:
      - internal

  certbot-renew:
    image: certbot/certbot:latest
    restart: unless-stopped
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - ./nginx/ssl:/exported-certs
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --non-interactive --deploy-hook 'if [ -n \"$CERTBOT_DOMAIN\" ] && [ -f /etc/letsencrypt/live/$CERTBOT_DOMAIN/fullchain.pem ]; then cp /etc/letsencrypt/live/$CERTBOT_DOMAIN/fullchain.pem /exported-certs/fullchain.pem && cp /etc/letsencrypt/live/$CERTBOT_DOMAIN/privkey.pem /exported-certs/privkey.pem; fi'; sleep 12h; done"
    networks:
      - internal

volumes:
  mongo_data:
  uploads_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
